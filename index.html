<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Rescue Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>🐾 Animal Rescue Game 🐾</h1>
            <div class="score-board">
                <div class="score">Score: <span id="score">0</span></div>
                <div class="timer">Time: <span id="timer">60</span>s</div>
                <div class="rescued">Rescued: <span id="rescued-count">0</span></div>
            </div>
        </header>

        <main>
            <div id="game-area">
                <div id="animals-container">
                    <!-- Animals will be dynamically generated here -->
                </div>
            </div>

            <div id="game-controls">
                <button id="start-button" class="btn btn-primary">Start Rescue Mission</button>
                <button id="pause-button" class="btn btn-secondary" disabled>Pause</button>
                <button id="reset-button" class="btn btn-secondary">Reset</button>
            </div>

            <div id="message-area">
                <p id="game-message">Welcome! Click "Start Rescue Mission" to begin saving animals!</p>
            </div>
        </main>

        <div id="game-over-modal" class="modal hidden">
            <div class="modal-content">
                <h2>Mission Complete!</h2>
                <p id="final-score-message"></p>
                <button id="play-again-button" class="btn btn-primary">Play Again</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
